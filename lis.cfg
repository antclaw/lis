# LIS 颜色配置文件
# 格式：扩展名：颜色
# 
# 基础颜色：
#   black red green yellow blue magenta cyan white
# 
# 亮色/高亮颜色：
#   brightblack (或 gray)
#   brightred brightgreen brightyellow brightblue
#   brightmagenta brightcyan brightwhite
# 
# 背景颜色：
#   bgblack bgred bggreen bgyellow bgblue
#   bgmagenta bgcyan bgwhite
#
# 示例配置：
folder: brightcyan
exe: brightgreen
com: brightgreen
zip: brightyellow
rar: brightyellow
7z: brightyellow
tar: brightyellow
gz: brightyellow
txt: cyan
md: brightmagenta
c: brightblue
cpp: brightblue
h: brightblue
py: green
js: yellow
html: brightred
css: magenta
png: brightwhite
jpg: brightwhite
gif: brightwhite
bmp: brightwhite
pdf: red
doc: blue
xls: green
ppt: yellow
lnk: gray
bat: brightred
cmd: brightred
ps1: brightmagenta
